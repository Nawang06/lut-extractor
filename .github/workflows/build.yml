name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "LUT Extractor Pro" --clean lut_extractor_pro.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LUT-Extractor-Pro-Windows
          path: dist/LUT Extractor Pro.exe

      - name: Update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest "dist/LUT Extractor Pro.exe" --title "LUT Extractor Pro (Latest Build)" --notes "Auto-built from latest commit. Just download and run — no install needed." --prerelease
